# Two-service deploy: the FastAPI app and the Cloudflare Tunnel daemon that
# fronts it. The api service intentionally does NOT publish a host port — the
# only path into it is the tunnel. See CLAUDE.md "The tunnel is the security
# boundary". Debug from inside the network with `docker compose exec api …`.

services:
  api:
    build: ./
    restart: unless-stopped
    # Enumerate vars explicitly instead of `env_file: .env` so TUNNEL_TOKEN
    # never lands in the api container's env. Compose auto-loads `.env` from
    # this directory for ${VAR} substitution, so the values still come from
    # the same file.
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
    expose:
      - "8000"
    # NO ports: section — only cloudflared (on the same compose network) can
    # reach this. Adding `ports: 8000:8000` would expose the API directly to
    # the Droplet's public IP and defeat the tunnel.

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      # Only cloudflared needs the tunnel token — see the api service above
      # for why it isn't shared.
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - api
